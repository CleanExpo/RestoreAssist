name: PR Quality Gates

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_SECRET: ci-placeholder
          NEXTAUTH_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          GOOGLE_MAPS_API_KEY: ci_placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # RA-1594 — dependency advisory audit. Surface high / critical CVEs
      # on every PR so they're visible before merge. `continue-on-error`
      # mirrors the other non-blocking checks in this gate: the signal is
      # what matters today, we can promote to fail-on-high once the
      # current backlog is clean.
      - name: Audit dependencies
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true
