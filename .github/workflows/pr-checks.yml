name: PR Quality Gates

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # RA-1546 companion — ephemeral Postgres for the migration-drift
    # check below. Without a real DB the check can't run, and the
    # P3009 incident from 2026-04-22 (45 stranded migrations) proved
    # that relying on "check it in prod" is not a gate.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_SECRET: ci-placeholder
          NEXTAUTH_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          GOOGLE_MAPS_API_KEY: ci_placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # RA-1594 — dependency advisory audit. Surface high / critical CVEs
      # on every PR so they're visible before merge. `continue-on-error`
      # mirrors the other non-blocking checks in this gate: the signal is
      # what matters today, we can promote to fail-on-high once the
      # current backlog is clean.
      - name: Audit dependencies
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true

      # RA-1546 — Prisma migration-drift gate. Applies every migration
      # in `prisma/migrations/` against the ephemeral Postgres service
      # above, then runs `prisma migrate status` and fails if anything
      # is pending, failed, or out-of-sync with `schema.prisma`. Catches
      # out-of-band schema edits and missing migration files BEFORE
      # the PR merges — preventing a repeat of the 2026-04-22 P3009
      # incident where 45 migrations stranded in prod.
      #
      # `continue-on-error: true` during the backlog-burn window so
      # existing drift doesn't chain-block every PR. Flip to false
      # once `prisma migrate status` is clean on main.
      - name: Prisma migration drift check
        run: |
          npx prisma migrate deploy
          npx prisma migrate status
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
