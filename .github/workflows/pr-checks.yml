name: PR Quality Gates

on:
  pull_request:
    branches: [main, sandbox]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # RA-1546 companion — ephemeral Postgres for the migration-drift
    # check below. Without a real DB the check can't run, and the
    # P3009 incident from 2026-04-22 (45 stranded migrations) proved
    # that relying on "check it in prod" is not a gate.
    services:
      postgres:
        # pgvector/pgvector:pg16 ships postgres:16 with the pgvector
        # extension preinstalled. The 20260406_iicrc_chunk_pgvector
        # migration creates a vector(...) column and would otherwise
        # fail with `extension "vector" is not available` against
        # plain postgres:16-alpine.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        # version is read from package.json#packageManager (pnpm@9.15.9) — must not duplicate here
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          PRISMA_SKIP_POSTINSTALL_GENERATE: "1"

      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # Must run BEFORE Build — `pnpm build` invokes `prisma migrate deploy`
      # via scripts/build.sh whenever DATABASE_URL is set (and VERCEL_ENV
      # isn't preview/development). On vanilla postgres:16-alpine the
      # 20260403010000_add_evidence_schema migration fails with
      # `schema "auth" does not exist`, which writes a failed row into
      # `_prisma_migrations`. Build is enforcing, and a failed migration row
      # also poisons the database for the later
      # `Prisma migration drift check` step (P3009). Stubbing the auth
      # schema HERE — before any step touches Postgres — keeps the DB
      # clean. Production unaffected: Supabase ships `auth.uid()` and
      # the CREATE OR REPLACE never runs there because the workflow only
      # runs in CI.
      - name: Bootstrap Supabase auth.uid() stub for CI
        run: |
          PGPASSWORD=ci psql -h localhost -U ci -d ci -c "
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
              LANGUAGE sql STABLE AS \$\$ SELECT NULL::uuid \$\$;
          "

      # RA-1548 follow-up — pre-resolve migrations that use
      # `CREATE INDEX CONCURRENTLY`. Prisma wraps each migration in a
      # transaction; CONCURRENTLY can't run inside one. These migrations
      # apply cleanly on Supabase (which uses a different mechanism)
      # but fail on the plain pgvector/pgvector:pg16 used in CI, leaving
      # a failed row in `_prisma_migrations` that poisons every later
      # `migrate deploy` (P3009) and turns this gate red on every PR.
      #
      # Marking them `--applied` here means CI agrees they're considered
      # applied without actually running them. The indexes they would
      # have created don't exist in CI's ephemeral DB, but no test in
      # this gate depends on those indexes existing.
      #
      # If a NEW migration file uses `CREATE INDEX CONCURRENTLY` and
      # this gate goes red again, append the migration name to the list
      # below.
      - name: Pre-resolve CONCURRENTLY migrations (Supabase-only syntax)
        run: |
          pnpm exec prisma migrate resolve --applied 20260407_n1_performance_indexes
          pnpm exec prisma migrate resolve --applied 20260407_perf_composite_indexes
          pnpm exec prisma migrate resolve --applied 20260516010000_inspection_close_terminal_index
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci

      # TypeScript Check flipped to enforcing 2026-05-06 (Wave 3 PR-E follow-up).
      # PR #891 brought the sandbox tree to 0 tsc errors (deleted 3 dead ai-elements
      # files, fixed 5 real bugs). Flipping the gate prevents future PRs from
      # silently regressing the type baseline.
      #
      # If a future PR genuinely needs to land with tsc errors (e.g. a partial
      # refactor where the next PR clears the rest), explicitly add a baseline
      # ratchet rather than re-enabling continue-on-error globally.
      - name: TypeScript Check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      # Branded-icon guard (RA-icon-system). Ratchet mode: fails if a PR adds
      # generic Unicode emojis beyond the recorded baseline
      # (scripts/emoji-baseline.json). Use [ra:*] tokens instead — see
      # docs/RESTOREASSIST_ICON_SYSTEM.md. The historical backlog burns down as
      # files are migrated; regenerate the baseline to ratchet the limit lower.
      - name: Emoji guard
        run: pnpm check:no-emoji

      # UTF-8 encoding guard (RA-6938). Fails if CLAUDE.md, AGENTS.md, or any
      # .claude/rules/*.md is committed as invalid-UTF-8 "data" (mojibake). The
      # primary agent brief was silently corrupted from the Commands section
      # onward on main; this cheap check stops that trust-damage class before merge.
      - name: Encoding guard
        run: pnpm check:encoding

      # Standards-citation integrity gate (STORM #7 / RA-6934). Fails on stale
      # IICRC editions (source literals + scripts/data/*.json corpus) and on
      # fabricated S500 section numbers whose top-level chapter does not exist in
      # the verified section index. Previously only defined in package.json and
      # never enforced in CI — wired here to close the blind spot.
      - name: Standards citation gate
        run: pnpm check:standards

      # Phase 2 AI guardrail gate. Static only: no provider calls, no DB
      # writes, and no runtime routing changes. Fails if a new AI/provider/RAG
      # surface cannot be classified into a known task class.
      - name: AI guardrail audit
        run: pnpm audit:ai

      # RA-6685 — apply migrations BEFORE the unit tests so the DB-gated suites
      # (described with `describe.skipIf(!process.env.DATABASE_URL)`:
      # trial-handling, setup checks, subscription-event, google-drive oauth,
      # setup routes, …) run against a real schema instead of silently
      # skipping. Idempotent: the later "Prisma migration drift check" step
      # re-runs `migrate deploy` (a no-op once applied) plus `migrate status`,
      # so the drift gate is unchanged.
      - name: Apply migrations for DB-gated tests
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Unit tests
        run: pnpm exec vitest run
        # RA-6685 — without DATABASE_URL the `skipIf(!process.env.DATABASE_URL)`
        # suites evaluate `skipIf(true)` and report green WITHOUT running.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci

      # Build flipped to enforcing 2026-05-06 (Wave 1 PR-B production-readiness push).
      # Vercel previews already pass `pnpm build` against both `restoreassist` and
      # `restoreassist-sandbox` projects on every PR, so flipping this from
      # `continue-on-error: true` to enforcing closes the gap where a CI build
      # break could merge silently while Vercel happened to succeed for an
      # unrelated reason. Phase 0 now also enforces type-check, lint, and unit
      # tests before this build step.
      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_SECRET: ci-placeholder
          NEXTAUTH_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          GOOGLE_MAPS_API_KEY: ci_placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # RA-1594 — dependency advisory audit. Surface high / critical CVEs
      # on every PR so they're visible before merge.
      # RA-6719 (2026-06-17): promoted to ENFORCING — the high prod CVE backlog
      # is now clean (RA-6728: pnpm audit --audit-level=high --prod exits 0) and
      # the minimatch CI blocker is resolved (RA-5193). A new high prod CVE now
      # fails the PR. Justified suppressions live in package.json
      # pnpm.auditConfig.ignoreGhsas.
      - name: Audit dependencies
        run: pnpm audit --audit-level=high --prod

      # RA-1546 — Prisma migration-drift gate. Applies every migration
      # in `prisma/migrations/` against the ephemeral Postgres service
      # above, then runs `prisma migrate status` and fails if anything
      # is pending, failed, or out-of-sync with `schema.prisma`. Catches
      # out-of-band schema edits and missing migration files BEFORE
      # the PR merges — preventing a repeat of the 2026-04-22 P3009
      # incident.
      #
      # FLIPPED 2026-04-27 (RA-1742 follow-up): `continue-on-error` is now
      # `false`. The 2026-04-27 outage left both prod + sandbox stuck for
      # days because main merged migrations that failed against the live
      # DB but passed (silently) here. The backlog-burn window is over —
      # main is clean, this gate now blocks merges.
      - name: Prisma migration drift check
        run: |
          pnpm exec prisma migrate deploy
          pnpm exec prisma migrate status
        env:
          # Schema declares both DATABASE_URL (pooled) and DIRECT_URL
          # (direct) per Supabase's standard pattern. CI's ephemeral
          # Postgres has no pooler, so point both at the same connection.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
