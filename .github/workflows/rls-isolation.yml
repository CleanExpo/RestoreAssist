name: RLS Tenant Isolation

# RA-6685 — the scripts/rls-harness (RA-4956) proves tenant A cannot read tenant
# B's rows under the `authenticated` role, but nothing ran it: `grep rls
# .github/workflows/` found only lighthouse. Only the STATIC
# audit-rls-coverage.test.ts ran, which by its own header does NOT prove
# runtime isolation. This wires the real harness in.
#
# Scoped to PRs that touch migrations (or the harness itself) — RLS policies
# live in migration files, so a migration is the only thing that can break the
# isolation guarantee. The Makefile spins up and tears down its own disposable
# postgres:16 via Docker (both Docker and psql are preinstalled on
# ubuntu-latest), so this job needs no `services:` block and never touches a
# remote database (run.sh refuses any non-localhost DATABASE_URL).

on:
  pull_request:
    branches: [main, sandbox]
    paths:
      - "**/migrations/**"
      - "scripts/rls-harness/**"

concurrency:
  group: rls-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # WS4 (RA-1807 remediation) — fast static forward-guard: any NEW/changed
  # migration policy predicate must wrap zero-arg auth.*() in (select …) so it
  # can't reintroduce the RA-4827 → RA-4956 auth_rls_initplan regression. Scans
  # BOTH prisma/migrations and docs/ops/supabase-migrations-archive (policies live in both roots).
  # fetch-depth: 0 so `git merge-base` against the PR base resolves.
  rls-initplan-lint:
    name: RLS InitPlan forward-guard (static)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Lint new policy predicates for bare auth.*()
        env:
          LINT_BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: node scripts/lint-rls-policy-initplan.mjs

  rls-isolation:
    name: RLS tenant isolation harness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run RLS isolation harness
        run: make -f scripts/rls-harness/Makefile rls-test
