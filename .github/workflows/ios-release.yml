name: iOS Release — App Store Connect

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: # Manual trigger from GitHub Actions UI

jobs:
  release-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Server-hosted WebView — no Next.js build needed.
      # The iOS app loads https://restoreassist.app directly.
      # We only need cap sync to copy native plugins.
      - name: Sync Capacitor iOS
        run: |
          mkdir -p ios/App/App/public
          npx cap sync ios
      - name: Install Fastlane
        run: gem install fastlane
      - name: Decode certificate
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 -d > ios_distribution.p12
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > profile.mobileprovision
      - name: Import certificate to keychain
        run: |
          security create-keychain -p "temp" build.keychain
          security import ios_distribution.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build IPA with Fastlane
        run: |
          fastlane gym \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --export_method app-store \
            --output_directory ./build \
            --output_name RestoreAssist.ipa
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload to TestFlight
        run: |
          fastlane pilot upload \
            --ipa ./build/RestoreAssist.ipa \
            --api_key_path <(echo "${{ secrets.ASC_PRIVATE_KEY_BASE64 }}" | base64 -d) \
            --issuer_id ${{ secrets.ASC_ISSUER_ID }} \
            --key_id ${{ secrets.ASC_API_KEY_ID }} \
            --skip_waiting_for_build_processing true
      - name: Notify on success
        if: success()
        run: echo "✅ iOS build uploaded to TestFlight"
