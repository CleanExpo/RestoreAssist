name: iOS Release — App Store Connect

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: # Manual trigger from GitHub Actions UI

permissions:
  contents: read

jobs:
  release-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Server-hosted WebView — no Next.js build needed.
      # The iOS app loads https://restoreassist.app directly.
      # We only need cap sync to copy native plugins.
      - name: Sync Capacitor iOS
        run: |
          mkdir -p ios/App/App/public
          npx cap sync ios

      - name: Install Fastlane
        run: gem install fastlane -N

      # ─────────────────────────────────────────────────────────────
      # SECRET HANDLING — pass via env, never interpolate ${{ secrets.* }}
      # directly into a `run:` shell script. Direct interpolation is
      # vulnerable to command injection if any secret ever contains
      # shell metacharacters (cert passwords, base64 with newlines,
      # IDs with `;`, etc).
      # ─────────────────────────────────────────────────────────────

      - name: Decode certificate + provisioning profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          printf '%s' "$IOS_CERTIFICATE_BASE64" | base64 -d > ios_distribution.p12
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > profile.mobileprovision

      - name: Import certificate to keychain
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "temp" build.keychain
          security import ios_distribution.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          # Modern macOS adds a key-partition ACL on top of -T. Without
          # this, codesign blocks on a GUI prompt that can never be
          # answered in CI — observed in run 24958163047 which hung for
          # 43 min on "Signing Cordova.framework" before the workflow
          # timed out. set-key-partition-list grants codesign + Apple
          # tools access to the imported key without prompting.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp" build.keychain

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA with Fastlane
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Capacitor 6+ project uses Swift Package Manager — no .xcworkspace
          # is generated. Build directly against the .xcodeproj.
          #
          # The committed project uses CODE_SIGN_STYLE = Automatic with
          # "iPhone Developer" identity — fine for local Xcode dev, but
          # CI manually installs an "Apple Distribution" cert + a named
          # provisioning profile and needs Manual signing.
          #
          # Two-step signing override:
          #   1. xcargs forces Manual signing during the `archive` phase.
          #   2. ExportOptions.plist forces Manual signing + maps the
          #      bundle id to the profile name during `exportArchive`.
          # Without (2), run #4 failed with:
          #   exportArchive "App.app" requires a provisioning profile.

          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.restoreassist.app</key>
                  <string>RestoreAssist App Store v1</string>
              </dict>
              <key>destination</key>
              <string>export</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          fastlane gym \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --configuration Release \
            --export_method app-store \
            --export_team_id "$APPLE_TEAM_ID" \
            --export_options /tmp/ExportOptions.plist \
            --codesigning_identity "Apple Distribution: Phill McGurk ($APPLE_TEAM_ID)" \
            --xcargs "DEVELOPMENT_TEAM=$APPLE_TEAM_ID CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY='Apple Distribution: Phill McGurk ($APPLE_TEAM_ID)' PROVISIONING_PROFILE_SPECIFIER='RestoreAssist App Store v1'" \
            --output_directory ./build \
            --output_name RestoreAssist.ipa

      - name: Write App Store Connect API key JSON
        env:
          ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        # Fastlane pilot/upload_to_testflight expects a single JSON
        # file containing key_id, issuer_id, and the .p8 key contents.
        # Run #5 failed with `invalid option: --issuer_id` because the
        # separate-flags pattern was deprecated. Produce the JSON
        # entirely in memory + write to a 0600 file; nothing leaks via
        # logs because we never `echo` the contents.
        run: |
          printf '%s' "$ASC_PRIVATE_KEY_BASE64" | base64 -d > /tmp/asc_api_key.p8
          chmod 600 /tmp/asc_api_key.p8

          # Build the JSON via python so the .p8 (which contains
          # newlines) is correctly JSON-encoded. The .p8 file is
          # consumed via env not stdin so it never traverses the
          # shell parser.
          ASC_API_KEY_P8="$(cat /tmp/asc_api_key.p8)" python3 -c '
          import json, os
          payload = {
              "key_id": os.environ["ASC_API_KEY_ID"],
              "issuer_id": os.environ["ASC_ISSUER_ID"],
              "key": os.environ["ASC_API_KEY_P8"],
              "duration": 1200,
              "in_house": False,
          }
          with open("/tmp/asc_api_key.json", "w") as f:
              json.dump(payload, f)
          ' && chmod 600 /tmp/asc_api_key.json

      - name: Upload to TestFlight
        run: |
          fastlane pilot upload \
            --ipa ./build/RestoreAssist.ipa \
            --api_key_path /tmp/asc_api_key.json \
            --skip_waiting_for_build_processing true

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f ios_distribution.p12 profile.mobileprovision /tmp/asc_api_key.p8 /tmp/asc_api_key.json /tmp/ExportOptions.plist
          security delete-keychain build.keychain || true

      - name: Notify on success
        if: success()
        run: echo "✅ iOS build uploaded to TestFlight"
