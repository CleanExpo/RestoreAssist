name: Android Build — Field App (com.restoreassist.app)

on:
  push:
    tags:
      - 'android-v*'          # e.g. android-v1.0.0
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Server-hosted WebView — no Next.js build needed.
      # The Android app loads https://restoreassist.com.au directly.
      # We only need cap sync to copy native plugins.
      - name: Sync Capacitor Android
        run: |
          mkdir -p android/app/src/main/assets/public
          npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/restoreassist-release.jks

      - name: Build signed AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/restoreassist-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEY_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: restoreassist-field-app-release-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Uncomment after adding GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret and
      # completing the closed testing period
