name: Android Build — Field App (com.restoreassist.app)

on:
  push:
    tags:
      - 'android-v*'          # e.g. android-v1.0.0
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build the Next.js static export
      # Note: for server-hosted WebView this step is only needed if
      # there's a pre-export step. The Android WebView loads restoreassist.com.au.
      # We still need a minimal web build for npx cap sync.
      - name: Build web app
        run: npm run build
        env:
          NEXTAUTH_URL: https://restoreassist.com.au
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/restoreassist-release.jks

      - name: Build signed AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/restoreassist-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEY_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: restoreassist-field-app-release-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Uncomment after adding GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret and
      # completing the closed testing period
      # - name: Upload to Google Play (Internal Testing)
