name: Smoke — Production

# Hits the @smoke-tagged Playwright suite against https://restoreassist.app
# every 15 minutes and on demand. Catches availability regressions that
# Sentry only surfaces *after* a real customer triggers them.
#
# Wave-U follow-up of the 2026-05-06 production-readiness push.

on:
  schedule:
    # Every 15 minutes, UTC. Keep this aligned with the synthetic-monitor
    # SLO once one is set; for now 15min is a reasonable noise/coverage
    # tradeoff (~96 runs/day, ~3000/month — well inside free GH Actions tier).
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to smoke (default: production)"
        required: false
        default: "https://restoreassist.app"
        type: string

concurrency:
  # Skip overlapping runs. If a run is in flight when the next 15-min tick
  # fires, the new run will be cancelled rather than queued — there's no
  # value in stacking smoke runs.
  group: smoke-prod-${{ github.event.inputs.base_url || 'default' }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke against prod
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # version is read from package.json#packageManager (pnpm@9.15.9) — single SSOT
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          HUSKY: "0"

      - name: Install Playwright browsers (chromium only — smoke is light)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run @smoke against prod
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://restoreassist.app' }}
          CI: true
          # RA-4987: secret-gated BotID bypass. Playwright injects this as the
          # x-smoke-test-token header (see config/playwright.config.ts); prod verifyBotId()
          # timing-safe-compares it against SMOKE_TEST_BOT_BYPASS_SECRET set in the
          # Vercel prod env. Both values MUST match. Unset here = header omitted =
          # GH egress IPs get flagged as bots (the pre-RA-4987 failure).
          SMOKE_TEST_BOT_BYPASS_SECRET: ${{ secrets.SMOKE_TEST_BOT_BYPASS_SECRET }}
        run: pnpm exec playwright test -c config/playwright.config.ts --grep @smoke --no-deps --reporter=line

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
