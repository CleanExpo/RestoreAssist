name: Pilot tester canary

on:
  schedule:
    # 16:00 UTC = 02:00 AEST next-day (off-peak for the sandbox).
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Sandbox base URL (must contain sandbox/staging/preview)"
        required: true
        default: "https://restoreassist-sandbox.vercel.app"
  pull_request:
    paths:
      - "packages/pilot-tester/**"
      - ".github/workflows/pilot-canary.yml"

permissions:
  contents: read

jobs:
  # Per-PR self-test — needs no secrets, no creds, no network.
  # Catches harness-internal regressions (safety guard, fixtures,
  # reporter, baseline analyser) without consuming AI budget.
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          HUSKY: "0"
      - name: Vitest
        working-directory: packages/pilot-tester
        run: pnpm install --ignore-scripts && pnpm test
      - name: Dry-run
        working-directory: packages/pilot-tester
        run: pnpm dryrun

  # Skip-with-notice gate (RA-7008): until the PILOT_TESTER_* secrets are
  # provisioned the scheduled swarm skips cleanly instead of burning a red
  # run every cycle; once both secrets exist the swarm resumes on its own.
  secrets-gate:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      provisioned: ${{ steps.check.outputs.provisioned }}
    steps:
      - name: Check pilot secrets presence
        id: check
        env:
          POOL_JSON: ${{ secrets.PILOT_TESTER_USER_POOL_JSON }}
          DATABASE_URL: ${{ secrets.PILOT_TESTER_DATABASE_URL }}
        run: |
          if [ -n "${POOL_JSON:-}" ] && [ -n "${DATABASE_URL:-}" ]; then
            echo "provisioned=true" >> "$GITHUB_OUTPUT"
          else
            echo "provisioned=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Pilot canary swarm skipped::PILOT_TESTER_USER_POOL_JSON / PILOT_TESTER_DATABASE_URL not provisioned (RA-7008). Seed pilot users (scripts/seed-pilot-users.ts) + set the repo secrets to activate the swarm."
          fi

  swarm:
    # Only on schedule + manual dispatch — never on PRs (would
    # consume AI budget against the sandbox workspace).
    needs: secrets-gate
    if: github.event_name != 'pull_request' && needs.secrets-gate.outputs.provisioned == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # version is read from package.json#packageManager (pnpm@9.15.9) — single SSOT

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install root deps (for prisma client + lib types)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          HUSKY: "0"

      - name: Validate pilot canary secrets
        env:
          POOL_JSON: ${{ secrets.PILOT_TESTER_USER_POOL_JSON }}
        run: |
          if [ -z "${POOL_JSON:-}" ]; then
            echo "::error title=Missing PILOT_TESTER_USER_POOL_JSON::Provision sandbox pilot users before running the swarm job."
            exit 2
          fi

          node <<'NODE'
          const raw = process.env.POOL_JSON ?? "";
          let pool;
          try {
            pool = JSON.parse(raw);
          } catch {
            console.error("::error title=Invalid PILOT_TESTER_USER_POOL_JSON::Secret must be valid JSON matching packages/pilot-tester/user-pool.example.json.");
            process.exit(2);
          }

          if (!Array.isArray(pool) || pool.length === 0) {
            console.error("::error title=Invalid PILOT_TESTER_USER_POOL_JSON::Secret must be a non-empty array of sandbox pilot users.");
            process.exit(2);
          }

          const required = ["email", "password", "workspaceName", "companyKey"];
          for (const [index, entry] of pool.entries()) {
            const missing = required.filter((key) => typeof entry?.[key] !== "string" || entry[key].length === 0);
            if (missing.length > 0) {
              console.error(`::error title=Invalid PILOT_TESTER_USER_POOL_JSON::Entry ${index} is missing: ${missing.join(", ")}.`);
              process.exit(2);
            }
          }
          NODE

      - name: Write user-pool from secret
        env:
          POOL_JSON: ${{ secrets.PILOT_TESTER_USER_POOL_JSON }}
        # CRITICAL: do NOT interpolate ${{ secrets.* }} directly into a
        # shell script — backticks / $(...) / ; in the secret would
        # execute. Pass via env and use printf with a quoted shell var
        # so the runtime never re-parses the value.
        run: |
          mkdir -p packages/pilot-tester
          printf '%s' "$POOL_JSON" > packages/pilot-tester/user-pool.json

      - name: Run swarm
        working-directory: packages/pilot-tester
        env:
          PILOT_TESTER_BASE_URL: ${{ github.event.inputs.base_url || 'https://restoreassist-sandbox.vercel.app' }}
          PILOT_TESTER_USER_POOL: ./user-pool.json
        run: pnpm swarm -- --concurrency 3

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pilot-tester-report
          path: packages/pilot-tester/reports/
          retention-days: 30
