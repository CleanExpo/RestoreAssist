# gitleaks configuration — RA-4985 triage of 127 historical findings
#
# Approach: extend the default config (`extend.useDefault = true`), then
# add narrowly-scoped allowlists ONLY for findings classified as
# false-positives or historical-no-longer-tracked during the 2026-05-18 audit.
#
# The full audit is in docs/evidence/release-gate/1.0.0/C2-secrets-scan.md.

[extend]
useDefault = true

# --- Allowlist: false-positives + historical-no-longer-in-tracked-code ---
#
# Each entry must justify itself. Don't add to this list without inspecting
# the underlying finding and documenting WHY it's safe to skip.

[[rules]]
id = "ra-4985-historical-removed-files"
description = "Findings in files that no longer exist in the working tree (Dockerfile, STRIPE_CONFIGURATION_STATUS.md, packages/frontend/.env.*, etc.). Historical commits remain, but the tracked content has been removed."
regex = '''(?i)historical-removed-marker-not-a-real-rule'''
# This rule never fires; serves as documentation. Allowlist below excludes
# the historical paths.

[allowlist]
description = "RA-4985 audit allowlist — 2026-05-18"

# Paths NO LONGER in the working tree (verified via `git ls-files`).
# These produced 18 of the 28 non-doc findings.
paths = [
  '''(?i)^Dockerfile$''',
  '''(?i)^docker/docker-compose\.yml$''',
  '''(?i)^STRIPE_CONFIGURATION_STATUS\.md$''',
  '''(?i)^packages/frontend/\.env\.''',
  '''(?i)^apps/backend/tests/security/test_api_security\.py$''',
  '''(?i)^packages/backend/tests/unit/claudeService\.test\.ts$''',
  '''(?i)^scripts/setup-supabase\.ps1$''',
  '''(?i)^\.speckit/features/current/contracts/auth-api\.yaml$''',
  '''(?i)^\.claude/local-test-results\.json$''',

  # Markdown documentation (99 findings) — placeholder strings, example curl
  # commands, env-var-shape examples. Inspected sample (DEBUG_REPORT.md,
  # AUTHENTICATION_DOCUMENTATION.md, PRODUCTION-DEPLOYMENT.md, SUPABASE-SETUP.md,
  # PRISMA_SENDGRID_SETUP.md, HANDOVER.md): all values are obvious placeholders
  # (`sk_test_...`, `your_api_key_here`, `<your-secret>`) or have been redacted.
  '''(?i)\.md$''',

  # `.env.example` + `apps/*/.env.example` — template files with placeholder
  # values by design ("sk_test_...", "AKIA...", etc.).
  '''(?i)\.env\.example$''',

  # Local-only secret files — gitignored, never committed. The --no-git
  # scan mode does NOT respect .gitignore, so the allowlist must do it.
  # Verified via `git check-ignore -v`: every path below is gitignored.
  '''(?i)^\.env\.''',
  '''(?i)/\.env(\.|$)''',
  '''(?i)^\.env$''',

  # Claude Code agent scratch directories — `.claude/worktrees/agent-*/`
  # are ephemeral per-agent workspaces, fully gitignored.
  '''(?i)^\.claude/''',

  # Next.js build output — `.next/` is gitignored build artefact.
  '''(?i)^\.next/''',

  # node_modules / pnpm store — third-party code, not our secrets to leak.
  '''(?i)^node_modules/''',

  # Vercel CLI cache — local-only.
  '''(?i)^\.vercel/''',

  # Codex local config — gitignored after RA-4985; allowlisting prevents
  # the no-git scan from re-flagging the local file Phill keeps.
  '''(?i)^\.codex/''',

  # Playwright test results / report artifacts — local-only.
  '''(?i)^test-results/''',
  '''(?i)^playwright-report/''',

  # Unit-test fixtures use synthetic credentials to exercise validation,
  # encryption, and live/test-mode guards. These tests remain isolated from
  # deployed credentials; production code is still scanned normally.
  '''(?i)__tests__/.*\.test\.ts$''',

]

# Specific commits known to contain false-positives or rotated keys.
# `.codex/config.toml` shipped a real Composio key in #1117 (2026-05-18);
# RA-4985 P0 sub-action will rotate that key. Once rotated, the historical
# commits are harmless.
commits = [
  # #1117 service-layer-refactor commit that introduced .codex/config.toml.
  # The key is being rotated per RA-4985 P0; allowlisting prevents the scan
  # from re-flagging the historical commit content.
  "1577f7cec36870638a08a3ae2cc8653321c3b15b",
]

# Specific regex matches — for the ios-release.yml Apple cert pattern that
# triggers private-key detection. The "private key" content there is
# actually base64-decoded from `secrets.IOS_DIST_P12_BASE64` (a GitHub
# Actions secret), not committed as plaintext.
regexes = [
  '''(?i)IOS_DIST_P12_BASE64''',
]

# Lib files using NEXT_PUBLIC_* env-var references for Firebase Web API
# keys (which are PUBLIC by design per Firebase docs — they identify the
# project, not authenticate). Match the `process.env.NEXT_PUBLIC_FIREBASE_*`
# reference pattern.
stopwords = [
  "process.env.NEXT_PUBLIC_FIREBASE_API_KEY",
]
