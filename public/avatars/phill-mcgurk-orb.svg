<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="faceGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1C2E47" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C9A0"/>
      <stop offset="100%" stop-color="#C9A87C"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B5038"/>
      <stop offset="100%" stop-color="#4A3528"/>
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B7494"/>
      <stop offset="100%" stop-color="#4A4F6B"/>
    </linearGradient>
  </defs>

  <!-- Background ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#8A6B4E" stroke-width="3"/>
  <circle cx="100" cy="100" r="90" fill="url(#faceGlow)"/>

  <!-- Neck -->
  <rect x="82" y="130" width="36" height="22" rx="6" fill="#B89B73"/>

  <!-- Shoulders / Suit -->
  <path d="M25 196 C25 160 55 140 75 135 L125 135 C145 140 175 160 175 196 Z" fill="url(#suit)"/>
  <path d="M85 135 L115 135 L115 165 L100 175 L85 165 Z" fill="#D4A08C"/>

  <!-- Collar -->
  <path d="M80 135 Q100 150 120 135 L120 145 Q100 160 80 145 Z" fill="#F0E6D8"/>

  <!-- Face -->
  <ellipse cx="100" cy="96" rx="38" ry="46" fill="url(#skin)"/>

  <!-- Hair -->
  <path d="M55 70 Q55 30 100 25 Q145 30 145 70 Q145 80 135 75 Q130 55 100 50 Q70 55 65 75 Q55 80 55 70 Z" fill="url(#hair)"/>
  <path d="M50 80 Q52 55 65 45 L65 65 Q58 70 50 80 Z" fill="url(#hair)"/>
  <path d="M150 80 Q148 55 135 45 L135 65 Q142 70 150 80 Z" fill="url(#hair)"/>

  <!-- Eyebrows -->
  <path d="M68 80 Q80 75 90 80" stroke="#4A3528" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M110 80 Q120 75 132 80" stroke="#4A3528" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="79" cy="92" rx="8" ry="5.5" fill="#FFF"/>
  <ellipse cx="79" cy="92" rx="4.5" ry="4.5" fill="#4A3728"/>
  <ellipse cx="80" cy="91" rx="1.5" ry="1.5" fill="#FFF"/>
  <ellipse cx="121" cy="92" rx="8" ry="5.5" fill="#FFF"/>
  <ellipse cx="121" cy="92" rx="4.5" ry="4.5" fill="#4A3728"/>
  <ellipse cx="122" cy="91" rx="1.5" ry="1.5" fill="#FFF"/>

  <!-- Nose -->
  <path d="M100 93 Q96 108 100 114 Q104 108 100 93" fill="none" stroke="#B89B73" stroke-width="2" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M78 122 Q100 137 122 122" fill="none" stroke="#A07B5B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M74 120 Q78 122 78 122" fill="none" stroke="#A07B5B" stroke-width="2" stroke-linecap="round"/>
  <path d="M126 120 Q122 122 122 122" fill="none" stroke="#A07B5B" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtle cheek lines -->
  <path d="M65 108 Q60 115 63 122" fill="none" stroke="#C9A87C" stroke-width="1" opacity="0.5"/>
  <path d="M135 108 Q140 115 137 122" fill="none" stroke="#C9A87C" stroke-width="1" opacity="0.5"/>

  <!-- Accent gold dot -->
  <circle cx="100" cy="185" r="3" fill="#D4A574"/>
</svg>